# ===========================================
# Kvittra — Nginx subdomain routing
# kvittra.se        → landing + login (frontend)
# *.kvittra.se      → org-specific app (same frontend, different slug)
# filipadmin.kvittra.se → superadmin (extra HTTP Basic Auth)
# ===========================================

# Upstream: frontend app
upstream kvittra_frontend {
    server 127.0.0.1:5173;  # Vite dev — change to built app in prod
}

# Upstream: Supabase Kong API gateway
upstream supabase_kong {
    server 127.0.0.1:8000;
}

# -----------------------------------------------
# filipadmin.kvittra.se — Superadmin (HTTP Basic Auth layer)
# -----------------------------------------------
server {
    listen 80;
    server_name filipadmin.kvittra.se;

    # HTTP Basic Auth as extra protection layer
    auth_basic "Superadmin";
    auth_basic_user_file /etc/nginx/.htpasswd_kvittra;

    # Supabase API
    location /rest/v1/ {
        proxy_pass http://supabase_kong/rest/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /auth/v1/ {
        proxy_pass http://supabase_kong/auth/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /functions/v1/ {
        proxy_pass http://supabase_kong/functions/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /storage/v1/ {
        proxy_pass http://supabase_kong/storage/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend
    location / {
        proxy_pass http://kvittra_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# -----------------------------------------------
# kvittra.se — Landing page + login portal
# -----------------------------------------------
server {
    listen 80;
    server_name kvittra.se www.kvittra.se;

    # Supabase API
    location /rest/v1/ {
        proxy_pass http://supabase_kong/rest/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /auth/v1/ {
        proxy_pass http://supabase_kong/auth/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /functions/v1/ {
        proxy_pass http://supabase_kong/functions/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /storage/v1/ {
        proxy_pass http://supabase_kong/storage/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend (landing + login)
    location / {
        proxy_pass http://kvittra_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# -----------------------------------------------
# *.kvittra.se — All org subdomains (wildcard)
# -----------------------------------------------
server {
    listen 80;
    server_name *.kvittra.se;

    # Supabase API
    location /rest/v1/ {
        proxy_pass http://supabase_kong/rest/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /auth/v1/ {
        proxy_pass http://supabase_kong/auth/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /functions/v1/ {
        proxy_pass http://supabase_kong/functions/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /storage/v1/ {
        proxy_pass http://supabase_kong/storage/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /realtime/v1/ {
        proxy_pass http://supabase_kong/realtime/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Upload size for videos (10GB)
    client_max_body_size 10G;

    # Frontend — same app, slug detected via hostname in JS
    location / {
        proxy_pass http://kvittra_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
