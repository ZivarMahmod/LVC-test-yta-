services:
  lvc-media-hub-dev:
    build: .
    container_name: lvc-media-hub-dev
    restart: unless-stopped
    ports:
      - "3002:3001"
    env_file:
      - ./backend/.env.dev
    environment:
      - DATABASE_URL=file:/app/data/lvc-media-hub.db
    volumes:
      - lvc-data-dev:/app/data
      - lvc-logs-dev:/app/backend/logs
      - /mnt/nas-matcher:/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lvc-data-dev:
  lvc-logs-dev:
