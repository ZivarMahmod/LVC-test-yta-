# ===========================================
# LVC Media Hub — Docker Compose (Production)
# Full Supabase Stack + App + Caddy
# ===========================================
services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: lvc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lvc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Ange POSTGRES_PASSWORD i .env}
      POSTGRES_DB: ${POSTGRES_DB:-lvcmediahub}
    volumes:
      - lvc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lvc} -d ${POSTGRES_DB:-lvcmediahub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Supabase Auth (GoTrue) ---
  supabase-auth:
    image: supabase/gotrue:v2.158.1
    container_name: lvc-supabase-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://${POSTGRES_USER:-lvc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lvcmediahub}?search_path=auth
      GOTRUE_SITE_URL: ${FRONTEND_URL:-http://localhost:3001}
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET:?Kör node scripts/generate-supabase-keys.js}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    depends_on:
      postgres:
        condition: service_healthy

  # --- Supabase REST API (PostgREST) ---
  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    container_name: lvc-supabase-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgresql://${POSTGRES_USER:-lvc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lvcmediahub}
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    depends_on:
      postgres:
        condition: service_healthy

  # --- Supabase Meta (pg-meta, krävs av Studio) ---
  supabase-meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: lvc-supabase-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-lvcmediahub}
      PG_META_DB_USER: ${POSTGRES_USER:-lvc}
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  # --- Supabase Studio (Dashboard UI) ---
  supabase-studio:
    image: supabase/studio:20250317-7db6263
    container_name: lvc-supabase-studio
    restart: unless-stopped
    ports:
      - "3040:3000"
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: "LVC Media Hub"
      DEFAULT_PROJECT_NAME: "lvcmediahub"
      SUPABASE_URL: http://supabase-rest:3000
      SUPABASE_PUBLIC_URL: http://localhost:3040
      SUPABASE_REST_URL: http://supabase-rest:3000
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_ANALYTICS_BACKEND_PROVIDER: ""
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    depends_on:
      - supabase-meta
      - supabase-rest
      - supabase-auth

  # --- Caddy Reverse Proxy (HTTP/HTTPS → App) ---
  caddy:
    image: caddy:2-alpine
    container_name: lvc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - lvc-caddy-data:/data
      - lvc-caddy-config:/config
    depends_on:
      - lvc-media-hub

  # --- LVC Media Hub App ---
  lvc-media-hub:
    build: .
    container_name: lvc-media-hub
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lvc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lvcmediahub}?schema=public
      - DIRECT_URL=postgresql://${POSTGRES_USER:-lvc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lvcmediahub}?schema=public
    volumes:
      - lvc-storage:/storage
      - lvc-logs:/app/backend/logs
      - lvc-thumbnails:/app/backend/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  lvc-pgdata:
  lvc-storage:
  lvc-logs:
  lvc-thumbnails:
  lvc-caddy-data:
  lvc-caddy-config:
